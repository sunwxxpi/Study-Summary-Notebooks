# 실험 재현성을 위한 시드
seed_everything: 42

# 모델 하이퍼파라미터
model:
  input_size: 32
  hidden_dim: 512

# Optimizer 설정 (외부 주입 방식)
optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 0.001
    weight_decay: 0.01

# 스케줄러 설정
lr_scheduler:
  class_path: torch.optim.lr_scheduler.CosineAnnealingLR
  init_args:
    T_max: 10
    eta_min: 1e-6

# Trainer 설정
trainer:
  deterministic: True
  accelerator: "gpu"
  devices: auto
  precision: bf16-mixed
  max_epochs: 10
  logger:
    class_path: lightning.pytorch.loggers.TensorBoardLogger
    init_args:
      save_dir: logs
      name: my_exp
      default_hp_metric: False
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: metrics/val_loss
        mode: min
        filename: "best-loss-{epoch:02d}"
        save_top_k: 1
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: metrics/val_acc
        mode: max
        filename: "best-acc-{epoch:02d}"
        save_top_k: 1
    - class_path: lightning.pytorch.callbacks.ModelSummary
      init_args:
        max_depth: -1

# 데이터 설정
data:
  img_size: 32
  batch_size: 128
  data_dir: ./data